<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequenz — {{ city }} Music Events</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

    <style>
        /* ============================================================
           RESET & VARIABLES
           ============================================================ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:            #0c0c0c;
            --bg-card:       #111111;
            --bg-card-hover: #161616;
            --border:        #1e1e1e;
            --border-bright: #2e2e2e;
            --text:          #ede8dd;
            --text-dim:      #6a6a6a;
            --text-faint:    #303030;

            /* Accent colours */
            --lime:    #c4f135;     /* exact matches, active states, primary CTA */
            --orange:  #ff5c35;    /* vibe matches */
            --red:     #ff3535;

            /* Kept for backwards-compat with inline styles and chart colours */
            --cyan:         #4d9fff;
            --cyan-dim:     rgba(77,159,255,0.1);
            --cyan-glow:    rgba(77,159,255,0.25);
            --magenta:      #ff5c35;
            --magenta-dim:  rgba(255,92,53,0.1);
            --magenta-glow: rgba(255,92,53,0.25);
            --green:        #c4f135;
            --green-dim:    rgba(196,241,53,0.12);
            --amber:        #ff5c35;
            --amber-dim:    rgba(255,92,53,0.12);

            /* Legacy variable aliases */
            --bg-primary:    #0c0c0c;
            --bg-secondary:  #0c0c0c;
            --text-primary:  #ede8dd;
            --text-secondary:#6a6a6a;
            --text-muted:    #383838;
            --border-glow:   #2e2e2e;
            --shadow:        0 2px 24px rgba(0,0,0,0.7);

            /* Typography */
            --font-display: 'Bebas Neue', 'Impact', sans-serif;
            --font-mono:    'Space Mono', 'Courier New', monospace;
            --font-body:    'DM Sans', 'Helvetica Neue', sans-serif;
            --font-heading: var(--font-display);

            --radius:    6px;
            --radius-sm: 4px;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Very subtle noise overlay — barely visible */
        .grain-overlay {
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.025'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
           HEADER — sticky horizontal masthead
           ============================================================ */
        header {
            position: sticky;
            top: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            padding: 0 2rem;
            background: rgba(12,12,12,0.96);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0;
        }

        /* Radar icon — smaller for horizontal header */
        .radar-icon {
            position: relative;
            width: 36px;
            height: 36px;
            flex-shrink: 0;
        }

        .radar-icon .ring {
            position: absolute;
            border: 1.5px solid var(--lime);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0;
            animation: radar-pulse 3s ease-out infinite;
        }

        .radar-icon .ring:nth-child(1) { width: 12px; height: 12px; animation-delay: 0s; }
        .radar-icon .ring:nth-child(2) { width: 22px; height: 22px; animation-delay: 0.6s; }
        .radar-icon .ring:nth-child(3) { width: 33px; height: 33px; animation-delay: 1.2s; }

        .radar-icon .dot {
            position: absolute;
            width: 5px; height: 5px;
            background: var(--lime);
            border-radius: 50%;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 8px rgba(196,241,53,0.6);
        }

        .radar-icon .sweep {
            position: absolute;
            top: 50%; left: 50%;
            width: 18px; height: 1.5px;
            background: linear-gradient(90deg, var(--lime), transparent);
            transform-origin: 0% 50%;
            animation: radar-sweep 3s linear infinite;
        }

        @keyframes radar-pulse {
            0%   { opacity: 0.7; transform: translate(-50%, -50%) scale(0.5); }
            100% { opacity: 0;   transform: translate(-50%, -50%) scale(1.2); }
        }

        @keyframes radar-sweep {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        h1 {
            font-family: var(--font-display);
            font-size: 1.6rem;
            letter-spacing: 0.06em;
            color: var(--text);
            /* reset gradient from old design */
            background: none;
            -webkit-background-clip: unset;
            -webkit-text-fill-color: var(--text);
            background-clip: unset;
        }

        .subtitle {
            font-family: var(--font-mono);
            font-size: 0.6rem;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--lime);
            font-weight: 400;
            /* centre-flex child */
            margin: 0 auto;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: var(--text-dim);
            letter-spacing: 0.02em;
            margin-top: 0;
        }

        .status-dot {
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--lime);
            box-shadow: 0 0 6px rgba(196,241,53,0.5);
            animation: blink 2s ease-in-out infinite;
            flex-shrink: 0;
        }

        .status-dot.offline {
            background: var(--text-faint);
            box-shadow: none;
            animation: none;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.35; }
        }

        /* ============================================================
           LAYOUT
           ============================================================ */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem 5rem;
        }

        /* Section headers using display font */
        .section-title {
            font-family: var(--font-display);
            font-size: 2rem;
            letter-spacing: 0.08em;
            font-weight: 400; /* Bebas Neue is always bold */
            color: var(--text);
            margin-bottom: 1.5rem;
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
        }

        .section-title .accent {
            color: var(--lime);
        }

        /* ============================================================
           TASTE PROFILE SECTION
           ============================================================ */
        .taste-section {
            margin-bottom: 3.5rem;
            animation: fade-up 0.5s ease-out 0.1s both;
        }

        .taste-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 1px; /* hairline gap — cards share borders */
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
        }

        @media (max-width: 900px) {
            .taste-grid { grid-template-columns: 1fr; }
        }

        /* Cards — flat panels, separated by hairline borders */
        .card {
            background: var(--bg-card);
            padding: 1.5rem;
            border: none;
            border-right: 1px solid var(--border);
            transition: background 0.2s;
        }

        .card:last-child { border-right: none; }
        .card:hover { background: var(--bg-card-hover); }

        .card-title {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--text-dim);
            margin-bottom: 1.25rem;
        }

        .chart-wrapper {
            position: relative;
            width: 100%;
        }

        .chart-wrapper canvas {
            width: 100% !important;
        }

        /* Stats */
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.65rem 0;
            border-bottom: 1px solid var(--border);
        }

        .stat-row:last-child { border-bottom: none; }

        .stat-label {
            font-family: var(--font-body);
            font-size: 0.82rem;
            color: var(--text-dim);
        }

        .stat-value {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--lime);
            letter-spacing: -0.02em;
        }

        .stat-value.magenta {
            color: var(--orange);
        }

        /* ============================================================
           EVENTS SECTION
           ============================================================ */
        .events-section {
            animation: fade-up 0.5s ease-out 0.25s both;
        }

        .filter-tabs {
            display: flex;
            gap: 0.4rem;
            margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }

        .filter-tab {
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            padding: 0.4rem 1rem;
            border-radius: 2px;
            border: 1px solid var(--border-bright);
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
        }

        .filter-tab:hover {
            border-color: var(--lime);
            color: var(--text);
        }

        .filter-tab.active {
            background: var(--lime);
            border-color: var(--lime);
            color: #0c0c0c;
            box-shadow: none;
        }

        .filter-tab .count {
            margin-left: 0.35rem;
            opacity: 0.65;
        }

        /* ---- EVENT LIST ---- */
        .events-grid {
            display: flex;
            flex-direction: column;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            gap: 0;
        }

        .event-card {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            border-left: 3px solid transparent;
            background: transparent;
            transition: background 0.15s;
            animation: fade-in 0.3s ease-out both;
        }

        .event-card:last-child { border-bottom: none; }

        .event-card:hover { background: rgba(255,255,255,0.022); }

        /* Color-code by match type using :has() */
        .event-card:has(.match-badge.exact) { border-left-color: var(--lime); }
        .event-card:has(.match-badge.vibe)  { border-left-color: var(--orange); }

        .event-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 1rem;
        }

        .event-name {
            font-family: var(--font-display);
            font-size: 1.55rem;
            letter-spacing: 0.03em;
            line-height: 1.05;
            color: var(--text);
            flex: 1;
        }

        .match-badge {
            flex-shrink: 0;
            font-family: var(--font-mono);
            font-size: 0.58rem;
            font-weight: 700;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            padding: 0.2rem 0.55rem;
            border-radius: 2px;
            margin-top: 0.35rem;
            border: none;
        }

        .match-badge.exact {
            background: var(--lime);
            color: #0c0c0c;
        }

        .match-badge.vibe {
            background: var(--orange);
            color: #fff;
        }

        .event-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem 1.25rem;
            font-family: var(--font-body);
            font-size: 0.78rem;
            color: var(--text-dim);
        }

        .event-meta-item {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .event-meta-item svg {
            width: 13px; height: 13px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        .event-artist-match {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.78rem;
        }

        .artist-avatar {
            width: 24px; height: 24px;
            border-radius: 50%;
            object-fit: cover;
            border: 1px solid var(--border-bright);
        }

        .artist-info .artist-name {
            font-weight: 500;
            color: var(--text);
            font-size: 0.78rem;
        }

        .artist-info .artist-source {
            font-family: var(--font-mono);
            font-size: 0.62rem;
            color: var(--text-dim);
            letter-spacing: 0.04em;
        }

        /* Confidence bar — slim and minimal */
        .confidence-bar {
            width: 100%;
            height: 2px;
            background: var(--text-faint);
            border-radius: 1px;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 1px;
            transition: width 0.6s ease-out;
        }

        .confidence-fill.exact { background: var(--lime); }
        .confidence-fill.vibe  { background: var(--orange); }

        .match-reason {
            font-family: var(--font-body);
            font-size: 0.72rem;
            color: var(--text-dim);
            font-style: italic;
            line-height: 1.4;
        }

        .event-link {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            font-family: var(--font-mono);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--lime);
            text-decoration: none;
            transition: opacity 0.15s;
        }

        .event-link:hover { opacity: 0.65; }

        .event-link svg {
            width: 11px; height: 11px;
        }

        /* ============================================================
           EMPTY STATE
           ============================================================ */
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-dim);
        }

        .empty-state svg {
            width: 56px; height: 56px;
            margin-bottom: 1rem;
            opacity: 0.2;
        }

        .empty-state h3 {
            font-family: var(--font-display);
            font-size: 1.4rem;
            letter-spacing: 0.06em;
            font-weight: 400;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .empty-state p {
            max-width: 380px;
            margin: 0 auto;
            font-size: 0.85rem;
        }

        /* ============================================================
           FLOATING ACTION BUTTONS
           ============================================================ */
        .fab-group {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            align-items: center;
        }

        .fab-group .refresh-fab { position: static; }

        .refresh-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 100;
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 1px solid var(--lime);
            background: var(--bg-card);
            color: var(--lime);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 16px rgba(196,241,53,0.15);
            transition: all 0.2s;
        }

        .refresh-fab:hover {
            background: rgba(196,241,53,0.1);
            transform: scale(1.08);
        }

        .refresh-fab svg {
            width: 20px; height: 20px;
            transition: transform 0.3s;
        }

        .refresh-fab.spinning svg {
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .refresh-fab .tooltip,
        .pdf-fab .tooltip {
            position: absolute;
            bottom: calc(100% + 0.5rem);
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm);
            padding: 0.35rem 0.65rem;
            font-family: var(--font-mono);
            font-size: 0.62rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .refresh-fab:hover .tooltip,
        .pdf-fab:hover .tooltip { opacity: 1; }

        .pdf-fab {
            width: 48px; height: 48px;
            border-radius: 50%;
            border: 1px solid var(--orange);
            background: var(--bg-card);
            color: var(--orange);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 16px rgba(255,92,53,0.12);
            transition: all 0.2s;
            position: relative;
        }

        .pdf-fab:hover {
            background: rgba(255,92,53,0.1);
            transform: scale(1.08);
        }

        .pdf-fab svg { width: 20px; height: 20px; }

        /* ============================================================
           SKELETON LOADING
           ============================================================ */
        .skeleton {
            background: linear-gradient(
                90deg,
                var(--bg-card) 25%,
                var(--bg-card-hover) 50%,
                var(--bg-card) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.8s ease-in-out infinite;
            border-radius: var(--radius-sm);
        }

        @keyframes shimmer {
            0%   { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card  { height: 160px; border-radius: var(--radius); }
        .skeleton-chart { height: 230px; border-radius: var(--radius); }

        /* ============================================================
           TOAST NOTIFICATIONS
           ============================================================ */
        .toast {
            position: fixed;
            top: 1.25rem;
            right: 1.25rem;
            z-index: 200;
            background: var(--bg-card);
            border: 1px solid var(--border-bright);
            border-radius: var(--radius-sm);
            padding: 0.65rem 1.1rem;
            font-family: var(--font-mono);
            font-size: 0.7rem;
            letter-spacing: 0.04em;
            color: var(--text);
            box-shadow: var(--shadow);
            transform: translateX(120%);
            transition: transform 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast.show    { transform: translateX(0); }
        .toast.success { border-left: 3px solid var(--lime); }
        .toast.error   { border-left: 3px solid var(--orange); }
        .toast.info    { border-left: 3px solid var(--cyan); }

        /* ============================================================
           ANIMATIONS
           ============================================================ */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @keyframes fade-in {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

        /* ============================================================
           GLOBAL PLATFORM TOGGLE (header)
           ============================================================ */
        .global-platform {
            display: flex;
            gap: 2px;
            background: var(--border);
            border-radius: 3px;
            padding: 1px;
        }

        .gp-btn {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.25rem 0.55rem;
            border: none;
            border-radius: 2px;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.15s;
        }

        .gp-btn:hover { color: var(--text); }
        .gp-btn.active { background: var(--lime); color: #0c0c0c; }

        #toggleArtistsBtn { background: transparent; border: 1px solid var(--border-bright); border-radius: 3px; }
        #toggleArtistsBtn.active { background: var(--lime); color: #0c0c0c; border-color: var(--lime); }

        /* ============================================================
           ARTISTS GRID
           ============================================================ */
        .artists-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 1px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            max-height: 420px;
            overflow-y: auto;
        }

        .artist-card {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            padding: 0.6rem 0.85rem;
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }

        .artist-card:hover { background: var(--bg-card-hover); }

        .artist-card img {
            width: 32px; height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .artist-card .placeholder-img {
            width: 32px; height: 32px;
            border-radius: 50%;
            flex-shrink: 0;
            background: var(--border);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.65rem; color: var(--text-dim);
        }

        .artist-card-info { min-width: 0; }

        .artist-card-name {
            font-family: var(--font-body);
            font-size: 0.78rem;
            font-weight: 500;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .artist-card-meta {
            font-family: var(--font-mono);
            font-size: 0.55rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .artist-card-meta .platform-dot {
            display: inline-block;
            width: 5px; height: 5px;
            border-radius: 50%;
            margin-right: 0.3rem;
            vertical-align: middle;
        }

        .platform-dot.spotify { background: var(--lime); }
        .platform-dot.soundcloud { background: var(--orange); }

        /* ============================================================
           RESPONSIVE
           ============================================================ */
        @media (max-width: 640px) {
            header { padding: 0 1rem; }
            .subtitle { display: none; }
            .container { padding: 1.5rem 1rem 4rem; }
            .event-card { padding: 1rem; }
            .event-name { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <div class="grain-overlay"></div>

    <!-- ================================================================
         NPS MODAL
    ================================================================ -->
    <div id="npsModal" style="display:none; position:fixed; inset:0; background:rgba(12,12,12,0.92); backdrop-filter:blur(8px); z-index:999; align-items:center; justify-content:center;">
        <div style="background:#111; border:1px solid #2a2a2a; border-radius:8px; padding:2rem 2.5rem; max-width:420px; width:90%; position:relative;">
            <button onclick="document.getElementById('npsModal').style.display='none'" style="position:absolute;top:1rem;right:1rem;background:none;border:none;color:#666;font-size:1.1rem;cursor:pointer;line-height:1;">✕</button>
            <p style="font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.14em;text-transform:uppercase;color:#c4f135;margin-bottom:1rem;">Quick question</p>
            <p style="font-size:0.95rem;font-weight:500;color:#ede8dd;margin-bottom:1.5rem;line-height:1.5;">How would you feel if you could no longer use Frequenz?</p>
            <div style="display:flex;flex-direction:column;gap:0.5rem;" id="npsButtons">
                <button onclick="submitNps('very_disappointed')" style="padding:0.7rem 1rem;background:rgba(196,241,53,0.06);border:1px solid rgba(196,241,53,0.2);border-radius:4px;color:#ede8dd;font-size:0.88rem;cursor:pointer;text-align:left;transition:background 0.15s;" onmouseover="this.style.background='rgba(196,241,53,0.12)'" onmouseout="this.style.background='rgba(196,241,53,0.06)'">Very disappointed</button>
                <button onclick="submitNps('somewhat_disappointed')" style="padding:0.7rem 1rem;background:rgba(196,241,53,0.06);border:1px solid rgba(196,241,53,0.2);border-radius:4px;color:#ede8dd;font-size:0.88rem;cursor:pointer;text-align:left;transition:background 0.15s;" onmouseover="this.style.background='rgba(196,241,53,0.12)'" onmouseout="this.style.background='rgba(196,241,53,0.06)'">Somewhat disappointed</button>
                <button onclick="submitNps('not_disappointed')" style="padding:0.7rem 1rem;background:rgba(196,241,53,0.06);border:1px solid rgba(196,241,53,0.2);border-radius:4px;color:#ede8dd;font-size:0.88rem;cursor:pointer;text-align:left;transition:background 0.15s;" onmouseover="this.style.background='rgba(196,241,53,0.12)'" onmouseout="this.style.background='rgba(196,241,53,0.06)'">Not disappointed</button>
            </div>
        </div>
    </div>

    <!-- ================================================================
         PIPELINE PROGRESS OVERLAY
    ================================================================ -->
    <div id="pipelineOverlay" style="display:none; position:fixed; inset:0; background:rgba(12,12,12,0.95); backdrop-filter:blur(10px); z-index:1000; display:none; align-items:center; justify-content:center; flex-direction:column; gap:2rem;">
        <div style="text-align:center; max-width:360px; padding:2rem;">
            <!-- Animated radar -->
            <div style="position:relative; width:72px; height:72px; margin:0 auto 1.5rem;">
                <svg viewBox="0 0 80 80" style="width:72px;height:72px;position:absolute;top:0;left:0;">
                    <circle cx="40" cy="40" r="36" fill="none" stroke="rgba(196,241,53,0.12)" stroke-width="1.5"/>
                    <circle cx="40" cy="40" r="24" fill="none" stroke="rgba(196,241,53,0.10)" stroke-width="1.5"/>
                    <circle cx="40" cy="40" r="12" fill="none" stroke="rgba(196,241,53,0.08)" stroke-width="1.5"/>
                    <line x1="40" y1="40" x2="76" y2="40" stroke="rgba(196,241,53,0.5)" stroke-width="1.5" stroke-linecap="round"/>
                    <circle cx="40" cy="40" r="3" fill="#c4f135"/>
                </svg>
                <svg viewBox="0 0 80 80" style="width:72px;height:72px;position:absolute;top:0;left:0;animation:radar-sweep 2s linear infinite;">
                    <defs>
                        <radialGradient id="sweepGrad" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#c4f135" stop-opacity="0.35"/>
                            <stop offset="100%" stop-color="#c4f135" stop-opacity="0"/>
                        </radialGradient>
                    </defs>
                    <path d="M40,40 L76,40 A36,36 0 0,0 40,4 Z" fill="url(#sweepGrad)"/>
                </svg>
            </div>

            <div id="overlayStep" style="font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:0.06em;color:#ede8dd; margin-bottom:0.4rem;">Connecting...</div>
            <div id="overlayDetail" style="font-family:'Space Mono',monospace;font-size:0.65rem;letter-spacing:0.04em;color:#6a6a6a; margin-bottom:1.5rem; min-height:1.2em;"></div>

            <!-- Progress bar -->
            <div style="background:rgba(255,255,255,0.06); border-radius:2px; height:3px; overflow:hidden; width:100%;">
                <div id="overlayProgressBar" style="height:100%; border-radius:2px; background:#c4f135; transition:width 0.6s ease; width:5%;"></div>
            </div>
            <div id="overlayPercent" style="font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.08em;color:#3a3a3a; margin-top:0.4rem; text-align:right;">5%</div>
        </div>
    </div>

    <!-- ================================================================
         HEADER
    ================================================================ -->
    <header>
        <div class="logo-container">
            <div class="radar-icon">
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="ring"></div>
                <div class="dot"></div>
                <div class="sweep"></div>
            </div>
            <h1>Frequenz</h1>
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem;">
            <!-- Global platform filter -->
            <div class="global-platform" id="globalPlatform">
                <button class="gp-btn active" data-gp="all">All</button>
                <button class="gp-btn" data-gp="spotify">Spotify</button>
                <button class="gp-btn" data-gp="soundcloud">SC</button>
            </div>
            <span style="color:var(--border-bright);margin:0 0.3rem;">|</span>
            <!-- Artists toggle -->
            <button class="gp-btn" id="toggleArtistsBtn" onclick="toggleArtistsSection()">Artists</button>
            <a href="/analysis" class="gp-btn" style="text-decoration:none;">Analysis</a>
        </div>
        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Loading...</span>
        </div>
    </header>

    <!-- ================================================================
         MAIN CONTENT
         ================================================================ -->
    <div class="container">

        <!-- Taste Profile Section -->
        <section class="taste-section">
            <h2 class="section-title"><span class="accent">//</span> Taste Profile</h2>
            <div class="taste-grid">
                <!-- Genre Distribution -->
                <div class="card">
                    <div class="card-title">Top Genres</div>
                    <div class="chart-wrapper" id="genreChartWrapper">
                        <div class="skeleton skeleton-chart"></div>
                    </div>
                </div>

                <!-- Audio Features Radar -->
                <div class="card">
                    <div class="card-title" style="display:flex;align-items:baseline;gap:0.5rem;">
                        Audio DNA
                        <span id="audioDnaLabel" style="font-size:0.6rem;color:var(--text-dim);font-weight:400;display:none;">(est. from genres)</span>
                    </div>
                    <div class="chart-wrapper" id="featuresChartWrapper">
                        <div class="skeleton skeleton-chart"></div>
                    </div>
                </div>

                <!-- Source Breakdown -->
                <div class="card">
                    <div class="card-title">Sources</div>
                    <div class="chart-wrapper" style="max-width: 190px; margin: 0 auto 1rem;">
                        <canvas id="sourceChart"></canvas>
                    </div>
                    <div id="statsContainer"></div>
                </div>
            </div>

            <!-- Underground Depth Score card -->
            <div class="depth-card" id="depthCard" style="display:none; margin-top:1px; border:1px solid var(--border); border-radius:var(--radius); padding:1.75rem 2rem; background:var(--bg-card);">
                <div style="display:flex; align-items:center; gap:2rem; flex-wrap:wrap;">
                    <div>
                        <div class="card-title" style="margin-bottom:0.5rem;">Underground Depth</div>
                        <div style="display:flex; align-items:baseline; gap:0.75rem;">
                            <span id="depthScore" style="font-family:var(--font-display);font-size:4rem;line-height:1;color:var(--lime);letter-spacing:0.02em;">—</span>
                            <span style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);letter-spacing:0.08em;">/ 100</span>
                        </div>
                        <div id="depthLabel" style="font-family:var(--font-display);font-size:1.2rem;letter-spacing:0.08em;color:var(--text);margin-top:0.4rem;"></div>
                        <div id="depthBlurb" style="font-family:var(--font-body);font-size:0.78rem;color:var(--text-dim);margin-top:0.3rem;max-width:380px;line-height:1.5;"></div>
                    </div>
                    <div style="flex:1; min-width:280px;">
                        <div class="card-title" style="margin-bottom:0.75rem;">Your Deepest Cuts</div>
                        <div id="deepestArtists" style="display:flex; flex-direction:column; gap:0.4rem;"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Artists Section (hidden by default, toggled via header button) -->
        <section class="artists-section" id="artistsSection" style="display:none; margin-bottom:3rem; animation: fade-up 0.3s ease-out both;">
            <h2 class="section-title"><span class="accent">//</span> Your Artists <span id="artistTotal" style="font-family:var(--font-mono);font-size:0.7rem;color:var(--text-dim);margin-left:0.5rem;letter-spacing:0.06em;"></span></h2>
            <div class="artists-grid" id="artistsGrid"></div>
        </section>

        <!-- Events Section -->
        <section class="events-section">
            <h2 class="section-title"><span class="accent">//</span> Matched Events</h2>

            <div class="filter-tabs" id="filterTabs">
                <button class="filter-tab active" data-filter="all">All <span class="count" id="countAll">0</span></button>
                <button class="filter-tab" data-filter="exact">Exact <span class="count" id="countExact">0</span></button>
                <button class="filter-tab" data-filter="vibe">Vibe <span class="count" id="countVibe">0</span></button>
            </div>

            <div class="events-grid" id="eventsGrid">
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
                <div class="skeleton skeleton-card"></div>
            </div>
        </section>
    </div>

    <!-- Floating Action Buttons -->
    <div class="fab-group">
        <button class="pdf-fab" id="pdfBtn" aria-label="Export PDF">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3M3 17V7a2 2 0 012-2h6l2 2h6a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            </svg>
            <span class="tooltip">Export PDF</span>
        </button>
        <button class="refresh-fab" id="refreshBtn" aria-label="Refresh data">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
            </svg>
            <span class="tooltip">Refresh data</span>
        </button>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>

    <!-- ================================================================
         JAVASCRIPT
         ================================================================ -->
    <script>
        // ============================================================
        // State
        // ============================================================
        let allMatches = [];
        let allArtists = [];
        let tasteProfile = null;
        let genreChart = null;
        let featuresChart = null;
        let sourceChart = null;
        let currentFilter = 'all';
        let currentPlatformFilter = 'all';
        let currentArtistPlatform = 'all';

        // ============================================================
        // Chart.js global defaults
        // ============================================================
        Chart.defaults.color = '#6a6a6a';
        Chart.defaults.borderColor = '#2e2e2e';
        Chart.defaults.font.family = "'DM Sans', sans-serif";

        // ============================================================
        // Toast notifications
        // ============================================================
        function showToast(message, type = 'info', duration = 3000) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), duration);
        }

        // ============================================================
        // Status bar
        // ============================================================
        function updateStatus(text, online = true) {
            document.getElementById('statusText').textContent = text;
            const dot = document.getElementById('statusDot');
            if (online) {
                dot.classList.remove('offline');
            } else {
                dot.classList.add('offline');
            }
        }

        // ============================================================
        // Format helpers
        // ============================================================
        function formatDate(isoStr) {
            const d = new Date(isoStr);
            const options = { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' };
            return d.toLocaleDateString('en-GB', options);
        }

        function formatSource(src) {
            const map = {
                'resident_advisor': 'Resident Advisor',
                'bandsintown': 'Bandsintown',
                'songkick': 'Songkick',
                'spotify': 'Spotify',
                'soundcloud': 'SoundCloud',
            };
            return map[src] || src;
        }

        function capitalise(str) {
            return str.charAt(0).toUpperCase() + str.slice(1);
        }

        // ============================================================
        // Fetch taste profile
        // ============================================================
        async function loadTasteProfile() {
            try {
                const resp = await fetch('/api/taste');
                const data = await resp.json();
                tasteProfile = data.taste_profile;
                renderGenreChart(tasteProfile.top_genres);
                renderFeaturesChart(tasteProfile.avg_features, data.features_estimated);
                renderSourceBreakdown(tasteProfile.sources, tasteProfile.total_artists);
            } catch (err) {
                console.error('Failed to load taste profile:', err);
            }
        }

        // ============================================================
        // Fetch events
        // ============================================================
        async function loadEvents() {
            try {
                const resp = await fetch('/api/events?match_type=all&days_ahead=365');
                const data = await resp.json();
                allMatches = data.matches || [];
                updateCounts();
                renderEvents(currentFilter);

                const total = allMatches.length;
                const exact = allMatches.filter(m => m.match_type === 'exact').length;
                const vibe = allMatches.filter(m => m.match_type === 'vibe').length;

                if (data.last_refresh) {
                    const d = new Date(data.last_refresh);
                    updateStatus(`${total} matches found \u00b7 Last refresh: ${d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })}`, true);
                } else {
                    updateStatus('No data yet \u2014 hit refresh to start', false);
                }
            } catch (err) {
                console.error('Failed to load events:', err);
                updateStatus('Failed to load events', false);
            }
        }

        // ============================================================
        // Update tab counts
        // ============================================================
        function countUniqueEvents(matches) {
            const seen = new Set();
            matches.forEach(m => {
                seen.add(m.event.url || (m.event.name + '|' + m.event.date));
            });
            return seen.size;
        }

        // ============================================================
        // Underground Depth Score
        // ============================================================
        async function loadDepthScore() {
            try {
                const r = await fetch('/api/depth-score');
                const d = await r.json();
                if (d.score === null || d.score === undefined) {
                    document.getElementById('depthCard').style.display = 'none';
                    return;
                }
                document.getElementById('depthCard').style.display = 'block';
                document.getElementById('depthScore').textContent = d.score;
                document.getElementById('depthLabel').textContent = d.label;
                document.getElementById('depthBlurb').textContent = d.blurb;

                const deepest = document.getElementById('deepestArtists');
                deepest.innerHTML = (d.deepest_artists || []).map(a => {
                    const img = a.image_url
                        ? `<img src="${escapeHtml(a.image_url)}" alt="" style="width:24px;height:24px;border-radius:50%;object-fit:cover;border:1px solid var(--border-bright);flex-shrink:0;">`
                        : `<div style="width:24px;height:24px;border-radius:50%;background:var(--border);flex-shrink:0;"></div>`;
                    return `
                        <div style="display:flex;align-items:center;gap:0.6rem;">
                            ${img}
                            <div style="font-family:var(--font-body);font-size:0.78rem;color:var(--text);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escapeHtml(a.name)}</div>
                            <div style="font-family:var(--font-mono);font-size:0.6rem;color:var(--text-dim);letter-spacing:0.04em;">pop ${a.popularity}</div>
                        </div>
                    `;
                }).join('');
            } catch (e) { /* ignore */ }
        }

        // ============================================================
        // Fetch and render artists
        // ============================================================
        async function loadArtists() {
            try {
                const resp = await fetch('/api/artists');
                const data = await resp.json();
                allArtists = data.artists || [];
                document.getElementById('artistTotal').textContent = allArtists.length ? `${allArtists.length} artists` : '';
                renderArtists(currentArtistPlatform);
            } catch (err) {
                console.error('Failed to load artists:', err);
            }
        }

        function renderArtists(platformFilter) {
            const grid = document.getElementById('artistsGrid');
            let artists = allArtists;
            if (platformFilter && platformFilter !== 'all') {
                artists = allArtists.filter(a => a.source === platformFilter);
            }

            if (artists.length === 0) {
                grid.innerHTML = '<div style="padding:2rem;text-align:center;color:var(--text-dim);font-size:0.85rem;grid-column:1/-1;">No artists yet. Hit refresh to sync your music.</div>';
                return;
            }

            grid.innerHTML = artists.map(a => {
                const imgHtml = a.image_url
                    ? `<img src="${escapeHtml(a.image_url)}" alt="${escapeHtml(a.name)}" loading="lazy">`
                    : `<div class="placeholder-img">${escapeHtml(a.name.charAt(0).toUpperCase())}</div>`;
                const platform = a.source || 'unknown';
                const platformLabel = platform === 'spotify' ? 'Spotify' : platform === 'soundcloud' ? 'SoundCloud' : platform;
                return `
                    <div class="artist-card">
                        ${imgHtml}
                        <div class="artist-card-info">
                            <div class="artist-card-name">${escapeHtml(a.name)}</div>
                            <div class="artist-card-meta"><span class="platform-dot ${platform}"></span>${platformLabel}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // Toggle artists section visibility
        function toggleArtistsSection() {
            const section = document.getElementById('artistsSection');
            const btn = document.getElementById('toggleArtistsBtn');
            const visible = section.style.display !== 'none';
            section.style.display = visible ? 'none' : 'block';
            btn.classList.toggle('active', !visible);
        }

        // Global platform filter (header)
        document.getElementById('globalPlatform').addEventListener('click', (e) => {
            const btn = e.target.closest('.gp-btn');
            if (!btn) return;
            document.querySelectorAll('#globalPlatform .gp-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentPlatformFilter = btn.dataset.gp;
            currentArtistPlatform = btn.dataset.gp;
            renderArtists(currentArtistPlatform);
            renderEvents(currentFilter);
            updateCounts();
        });

        function updateCounts() {
            document.getElementById('countAll').textContent = countUniqueEvents(allMatches);
            document.getElementById('countExact').textContent = countUniqueEvents(allMatches.filter(m => m.match_type === 'exact'));
            document.getElementById('countVibe').textContent = countUniqueEvents(allMatches.filter(m => m.match_type === 'vibe'));
        }

        // ============================================================
        // Genre Chart (horizontal bar)
        // ============================================================
        function renderGenreChart(genres) {
            const wrapper = document.getElementById('genreChartWrapper');
            if (!genres || genres.length === 0) {
                wrapper.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 2rem 0;">No genre data available. Hit refresh to collect your music data.</p>';
                return;
            }

            const top = genres.slice(0, 12);
            wrapper.innerHTML = '<canvas id="genreChart"></canvas>';
            const ctx = document.getElementById('genreChart').getContext('2d');

            genreChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: top.map(g => capitalise(g.genre)),
                    datasets: [{
                        data: top.map(g => g.count),
                        // Fade from lime to orange across the bars
                        backgroundColor: top.map((_, i) => {
                            const ratio = i / Math.max(top.length - 1, 1);
                            // lime #c4f135 → orange #ff5c35
                            const r = Math.round(196 + ratio * (255 - 196));
                            const g2 = Math.round(241 - ratio * (241 - 92));
                            const b = Math.round(53 + ratio * (53 - 53));
                            return `rgba(${r}, ${g2}, ${b}, 0.8)`;
                        }),
                        borderColor: 'transparent',
                        borderRadius: 3,
                        barThickness: 16,
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#111',
                            titleColor: '#ede8dd',
                            bodyColor: '#6a6a6a',
                            borderColor: '#2e2e2e',
                            borderWidth: 1,
                            cornerRadius: 4,
                            padding: 10,
                            callbacks: {
                                label: ctx => `${ctx.raw} artists`
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(255,255,255,0.04)', drawBorder: false },
                            ticks: { font: { size: 11 }, color: '#6a6a6a' }
                        },
                        y: {
                            grid: { display: false },
                            ticks: { font: { size: 11 }, color: '#6a6a6a' }
                        }
                    }
                }
            });

            // Set canvas height based on number of genres
            const canvasEl = document.getElementById('genreChart');
            canvasEl.parentElement.style.height = Math.max(200, top.length * 30) + 'px';
        }

        // ============================================================
        // Audio Features Radar Chart
        // ============================================================
        function renderFeaturesChart(features, estimated) {
            const wrapper = document.getElementById('featuresChartWrapper');
            const label = document.getElementById('audioDnaLabel');
            if (!features) {
                wrapper.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 2rem 0;">No audio features available yet.</p>';
                return;
            }
            if (label) label.style.display = estimated ? 'inline' : 'none';

            wrapper.innerHTML = '<canvas id="featuresChart"></canvas>';
            const ctx = document.getElementById('featuresChart').getContext('2d');

            // Normalize tempo from BPM to 0-1 range for the radar
            const tempoNormalized = Math.min(Math.max((features.tempo - 60) / 140, 0), 1);

            const labels = ['Danceability', 'Energy', 'Tempo', 'Valence', 'Acousticness', 'Instrumentalness', 'Liveness', 'Speechiness'];
            const values = [
                features.danceability,
                features.energy,
                tempoNormalized,
                features.valence,
                features.acousticness,
                features.instrumentalness,
                features.liveness,
                features.speechiness
            ];

            featuresChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Your Profile',
                        data: values,
                        backgroundColor: 'rgba(196, 241, 53, 0.1)',
                        borderColor: '#c4f135',
                        borderWidth: 2,
                        pointBackgroundColor: '#c4f135',
                        pointBorderColor: '#c4f135',
                        pointRadius: 3,
                        pointHoverRadius: 5,
                        fill: true,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: '#111',
                            titleColor: '#ede8dd',
                            bodyColor: '#6a6a6a',
                            borderColor: '#2e2e2e',
                            borderWidth: 1,
                            cornerRadius: 4,
                            callbacks: {
                                label: function(ctx) {
                                    const idx = ctx.dataIndex;
                                    if (idx === 2) return `Tempo: ${features.tempo.toFixed(0)} BPM`;
                                    return `${ctx.label}: ${(ctx.raw * 100).toFixed(0)}%`;
                                }
                            }
                        }
                    },
                    scales: {
                        r: {
                            beginAtZero: true,
                            max: 1,
                            ticks: { stepSize: 0.2, display: false },
                            grid: { color: 'rgba(255,255,255,0.06)' },
                            angleLines: { color: 'rgba(255,255,255,0.04)' },
                            pointLabels: {
                                font: { size: 10, family: "'Space Mono', monospace" },
                                color: '#6a6a6a',
                            }
                        }
                    }
                }
            });
        }

        // ============================================================
        // Source Breakdown (Pie + Stats)
        // ============================================================
        function renderSourceBreakdown(sources, totalArtists) {
            const statsContainer = document.getElementById('statsContainer');
            const canvas = document.getElementById('sourceChart');

            if (!sources || Object.keys(sources).length === 0) {
                canvas.style.display = 'none';
                statsContainer.innerHTML = '<p style="color: var(--text-muted); font-size: 0.85rem; text-align: center; padding: 1rem 0;">No source data yet.</p>';
                return;
            }

            // Doughnut — neutral palette matching new design
            const labels = Object.keys(sources).map(formatSource);
            const values = Object.values(sources);
            const colors = ['#c4f135', '#ff5c35', '#ede8dd', '#6a6a6a'];

            sourceChart = new Chart(canvas.getContext('2d'), {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, labels.length).map(c => c + '22'),
                        borderColor: colors.slice(0, labels.length),
                        borderWidth: 2,
                        hoverOffset: 6,
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    cutout: '68%',
                    plugins: {
                        legend: {
                            position: 'bottom',
                            labels: {
                                padding: 12,
                                usePointStyle: true,
                                pointStyleWidth: 8,
                                font: { size: 10, family: "'Space Mono', monospace" },
                                color: '#6a6a6a',
                            }
                        },
                        tooltip: {
                            backgroundColor: '#111',
                            titleColor: '#ede8dd',
                            bodyColor: '#6a6a6a',
                            borderColor: '#2e2e2e',
                            borderWidth: 1,
                            cornerRadius: 4,
                            callbacks: {
                                label: ctx => `${ctx.label}: ${ctx.raw} artists`
                            }
                        }
                    }
                }
            });

            // Stats
            statsContainer.innerHTML = `
                <div class="stat-row">
                    <span class="stat-label">Total Artists</span>
                    <span class="stat-value">${totalArtists}</span>
                </div>
                ${Object.entries(sources).map(([src, count]) => `
                    <div class="stat-row">
                        <span class="stat-label">${formatSource(src)}</span>
                        <span class="stat-value" style="font-size: 1.1rem;">${count}</span>
                    </div>
                `).join('')}
            `;
        }

        // ============================================================
        // Render event cards
        // ============================================================
        function renderEvents(filter) {
            const grid = document.getElementById('eventsGrid');
            let matches = allMatches;

            if (filter === 'exact') {
                matches = allMatches.filter(m => m.match_type === 'exact');
            } else if (filter === 'vibe') {
                matches = allMatches.filter(m => m.match_type === 'vibe');
            }

            // Platform filter
            if (currentPlatformFilter && currentPlatformFilter !== 'all') {
                matches = matches.filter(m => m.matched_artist.source === currentPlatformFilter);
            }

            if (matches.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 9l10.5-3m0 6.553v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 11-.99-3.467l2.31-.66a2.25 2.25 0 001.632-2.163zm0 0V2.25L9 5.25v10.303m0 0v3.75a2.25 2.25 0 01-1.632 2.163l-1.32.377a1.803 1.803 0 01-.99-3.467l2.31-.66A2.25 2.25 0 009 15.553z"/>
                        </svg>
                        <h3>No matches yet</h3>
                        <p>Hit the refresh button to scan your music taste and find matching events in the city.</p>
                    </div>
                `;
                return;
            }

            // Group matches by event URL so one event = one card,
            // deduplicating matched artists by name (same artist from
            // both Spotify and SoundCloud should appear only once).
            const eventMap = new Map();
            matches.forEach(match => {
                const key = match.event.url || (match.event.name + '|' + match.event.date);
                if (!eventMap.has(key)) {
                    eventMap.set(key, { ...match, matched_artists: [match.matched_artist], _seen_names: new Set([match.matched_artist.name.toLowerCase()]) });
                } else {
                    const g = eventMap.get(key);
                    const lname = match.matched_artist.name.toLowerCase();
                    if (!g._seen_names.has(lname)) {
                        g._seen_names.add(lname);
                        g.matched_artists.push(match.matched_artist);
                    }
                    if (match.confidence > g.confidence) g.confidence = match.confidence;
                }
            });
            const grouped = Array.from(eventMap.values());

            grid.innerHTML = grouped.map((match, idx) => {
                const e = match.event;
                const isExact = match.match_type === 'exact';
                const badgeClass = isExact ? 'exact' : 'vibe';
                const badgeText = isExact ? 'Exact' : 'Vibe';
                const confidence = Math.round(match.confidence * 100);

                // Artist avatars — show up to 3, then "+N more"
                const artists = match.matched_artists;
                const avatarHtml = artists.slice(0, 3).map(a =>
                    a.image_url
                        ? `<img class="artist-avatar" src="${a.image_url}" alt="${a.name}" loading="lazy" title="${a.name}">`
                        : `<div class="artist-avatar" style="background: linear-gradient(135deg, var(--cyan), var(--magenta));" title="${a.name}"></div>`
                ).join('');
                const artistNames = artists.map(a => escapeHtml(a.name)).join(', ');
                const artistSource = [...new Set(artists.map(a => formatSource(a.source)))].join(' · ');

                // Venue
                const venueName = e.venue ? e.venue.name : 'Venue TBA';

                return `
                    <div class="event-card" style="animation-delay: ${idx * 0.04}s;">
                        <div class="event-card-header">
                            <div class="event-name">${escapeHtml(e.name)}</div>
                            <span class="match-badge ${badgeClass}">${badgeText}</span>
                        </div>

                        <div class="event-meta">
                            <span class="event-meta-item">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5"/></svg>
                                ${formatDate(e.date)}
                            </span>
                            <span class="event-meta-item">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1115 0z"/></svg>
                                ${escapeHtml(venueName)}
                            </span>
                            <span class="event-meta-item" style="color: var(--text-muted); font-size: 0.7rem;">
                                via ${formatSource(e.source)}
                            </span>
                        </div>

                        <div class="event-artist-match">
                            ${avatarHtml}
                            <div class="artist-info">
                                <div class="artist-name">${artistNames}</div>
                                <div class="artist-source">${artistSource}</div>
                            </div>
                        </div>

                        <div>
                            <div style="display: flex; justify-content: space-between; margin-bottom: 4px;">
                                <span style="font-family:'Space Mono',monospace;font-size:0.6rem;letter-spacing:0.06em;text-transform:uppercase;color: var(--text-muted);">Confidence</span>
                                <span style="font-family:'Space Mono',monospace;font-size:0.6rem;color: var(--text-dim); font-weight: 700;">${confidence}%</span>
                            </div>
                            <div class="confidence-bar">
                                <div class="confidence-fill ${badgeClass}" style="width: ${confidence}%;"></div>
                            </div>
                        </div>

                        <div class="match-reason">${escapeHtml(match.match_reason)}</div>

                        ${e.url ? `
                            <a class="event-link" href="${e.url}" target="_blank" rel="noopener">
                                View event
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13.5 6H5.25A2.25 2.25 0 003 8.25v10.5A2.25 2.25 0 005.25 21h10.5A2.25 2.25 0 0018 18.75V10.5m-10.5 6L21 3m0 0h-5.25M21 3v5.25"/></svg>
                            </a>
                        ` : ''}
                    </div>
                `;
            }).join('');
        }

        // ============================================================
        // HTML escape helper
        // ============================================================
        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        // ============================================================
        // Filter tabs
        // ============================================================
        document.getElementById('filterTabs').addEventListener('click', (e) => {
            const tab = e.target.closest('.filter-tab');
            if (!tab || !tab.dataset.filter) return;

            document.querySelectorAll('#filterTabs .filter-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentFilter = tab.dataset.filter;
            renderEvents(currentFilter);
        });

        // ============================================================
        // Refresh button
        // ============================================================
        document.getElementById('refreshBtn').addEventListener('click', async () => {
            const btn = document.getElementById('refreshBtn');
            if (btn.classList.contains('spinning')) return;

            btn.classList.add('spinning');
            showOverlay('Starting refresh...', 'Connecting to your music sources...', 5);
            startStatusPolling();

            try {
                const resp = await fetch('/api/refresh');
                const data = await resp.json();
                if (data.status === 'already_running') {
                    showToast('A refresh is already in progress...', 'info');
                }
            } catch (err) {
                hideOverlay();
                showToast('Network error during refresh', 'error');
                console.error('Refresh failed:', err);
            } finally {
                btn.classList.remove('spinning');
            }
        });

        // ============================================================
        // PDF export button
        // ============================================================
        document.getElementById('pdfBtn').addEventListener('click', () => {
            showToast('Generating PDF report...', 'info', 2000);
            window.location.href = '/api/report/pdf';
        });

        // ============================================================
        // Auth status check (on page load)
        // ============================================================
        function checkAuthParams() {
            const params = new URLSearchParams(window.location.search);
            if (params.get('auth_success') === '1') {
                showToast('Spotify connected successfully!', 'success');
                window.history.replaceState({}, '', '/');
            } else if (params.get('auth_error') === '1') {
                showToast('Spotify authentication failed. Please try again.', 'error', 5000);
                window.history.replaceState({}, '', '/');
            }
        }

        // ============================================================
        // Initialise
        // ============================================================
        // ============================================================
        // Pipeline progress overlay
        // ============================================================
        const overlay = document.getElementById('pipelineOverlay');
        const overlayStep = document.getElementById('overlayStep');
        const overlayDetail = document.getElementById('overlayDetail');
        const overlayBar = document.getElementById('overlayProgressBar');
        const overlayPercent = document.getElementById('overlayPercent');

        function showOverlay(step, detail, progress) {
            overlay.style.display = 'flex';
            overlayStep.textContent = step || 'Loading...';
            overlayDetail.textContent = detail || '';
            const pct = Math.max(5, progress || 5);
            overlayBar.style.width = pct + '%';
            overlayPercent.textContent = pct + '%';
        }

        function hideOverlay() {
            overlay.style.display = 'none';
        }

        let statusPoll = null;

        async function startStatusPolling() {
            if (statusPoll) return;
            statusPoll = setInterval(async () => {
                try {
                    const r = await fetch('/api/pipeline-status');
                    const d = await r.json();
                    if (d.running && d.status) {
                        showOverlay(d.status.step, d.status.detail, d.status.progress);
                    } else if (!d.running && d.last_refresh) {
                        // Pipeline finished — load fresh data
                        clearInterval(statusPoll);
                        statusPoll = null;
                        showOverlay('Done!', 'Your matches are ready.', 100);
                        setTimeout(async () => {
                            hideOverlay();
                            await Promise.all([loadTasteProfile(), loadEvents(), loadArtists(), loadDepthScore()]);
                        }, 800);
                    } else if (!d.running && !d.last_refresh) {
                        // Nothing running and no data — stop polling, show empty state
                        clearInterval(statusPoll);
                        statusPoll = null;
                        hideOverlay();
                    }
                } catch (e) { /* ignore */ }
            }, 1500);
        }

        async function submitNps(score) {
            document.getElementById('npsModal').style.display = 'none';
            try {
                await fetch('/api/nps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ score }),
                });
            } catch (e) { /* ignore */ }
        }

        async function checkNps() {
            try {
                const r = await fetch('/api/nps-status');
                const d = await r.json();
                if (d.show) document.getElementById('npsModal').style.display = 'flex';
            } catch (e) { /* ignore */ }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            checkAuthParams();

            // Check if pipeline is already running on page load
            try {
                const r = await fetch('/api/pipeline-status');
                const d = await r.json();
                if (d.running) {
                    showOverlay(
                        d.status ? d.status.step : 'Loading your music data...',
                        d.status ? d.status.detail : 'This takes about 30 seconds',
                        d.status ? d.status.progress : 5,
                    );
                    startStatusPolling();
                    return; // Don't load data yet — wait for pipeline to finish
                }
            } catch (e) { /* ignore, just load normally */ }

            await Promise.all([loadTasteProfile(), loadEvents(), loadArtists(), loadDepthScore()]);
            checkNps();
        });

    </script>
</body>
</html>
