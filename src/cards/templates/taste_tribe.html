<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  background: #0c0c0c;
  overflow: hidden;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

.card-border {
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  border-image: linear-gradient(135deg, #c4f135, #ff5c35) 1;
  pointer-events: none;
  z-index: 100;
}

.grain {
  position: absolute;
  inset: 0;
  z-index: 90;
  opacity: 0.35;
  pointer-events: none;
}
.grain svg { width: 100%; height: 100%; }

/* Radial glow behind tribe name */
.tribe-glow {
  position: absolute;
  width: 1100px;
  height: 1100px;
  top: 32%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(196,241,53,0.16) 0%, rgba(196,241,53,0.05) 35%, transparent 65%);
  border-radius: 50%;
  z-index: 1;
}

/* Secondary glow */
.tribe-glow-2 {
  position: absolute;
  width: 500px;
  height: 500px;
  top: 60%;
  right: -5%;
  background: radial-gradient(circle, rgba(255,92,53,0.1) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
}

.content {
  position: relative;
  z-index: 10;
  padding: 280px 72px 280px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

.rarity-badge {
  position: absolute;
  top: 42px;
  right: 42px;
  z-index: 50;
  padding: 8px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 4px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.rarity-common { background: rgba(160,160,160,0.15); color: #a0a0a0; border: 1px solid rgba(160,160,160,0.3); }
.rarity-uncommon { background: rgba(196,241,53,0.1); color: #c4f135; border: 1px solid rgba(196,241,53,0.3); }
.rarity-rare { background: rgba(255,92,53,0.12); color: #ff5c35; border: 1px solid rgba(255,92,53,0.35); }
.rarity-legendary { background: linear-gradient(135deg, rgba(196,241,53,0.15), rgba(255,92,53,0.15)); color: #f5f5f5; border: 1px solid rgba(255,200,50,0.5); box-shadow: 0 0 20px rgba(255,200,50,0.15); }

.card-number {
  position: absolute;
  bottom: 42px;
  right: 48px;
  z-index: 50;
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(160,160,160,0.5);
}

.branding {
  position: absolute;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(160,160,160,0.45);
}

/* Header */
.tribe-header {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  color: #a0a0a0;
  letter-spacing: 3px;
  text-transform: uppercase;
  margin-bottom: 32px;
}

/* Tribe icon */
.tribe-icon {
  font-size: 80px;
  margin-bottom: 16px;
  filter: drop-shadow(0 0 30px rgba(196,241,53,0.4));
}

/* Tribe name — stacked massive */
.tribe-name {
  font-family: 'Bebas Neue', sans-serif;
  line-height: 0.88;
  letter-spacing: 4px;
  margin-bottom: 36px;
}

.tribe-name .word {
  display: block;
  font-size: 160px;
}

.tribe-name .word:first-child {
  color: #f5f5f5;
}
.tribe-name .word:nth-child(2) {
  color: #c4f135;
  text-shadow: 0 0 60px rgba(196,241,53,0.3), 0 0 120px rgba(196,241,53,0.1);
}
.tribe-name .word:nth-child(n+3) {
  color: #c4f135;
  text-shadow: 0 0 60px rgba(196,241,53,0.3);
}

/* Tagline */
.tagline {
  font-family: 'DM Sans', sans-serif;
  font-style: italic;
  font-size: 34px;
  color: #a0a0a0;
  margin-bottom: 40px;
  line-height: 1.4;
}

/* Confidence meter */
.confidence-section {
  margin-bottom: 36px;
}

.confidence-label {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: #a0a0a0;
  margin-bottom: 12px;
  text-transform: uppercase;
  letter-spacing: 2px;
}

.confidence-track {
  width: 100%;
  height: 16px;
  background: rgba(245,245,245,0.06);
  border-radius: 8px;
  overflow: hidden;
  position: relative;
}

.confidence-fill {
  height: 100%;
  border-radius: 8px;
  background: linear-gradient(90deg, #c4f135, #c4f135);
  box-shadow: 0 0 16px rgba(196,241,53,0.4);
  position: relative;
}

.confidence-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 8px;
  background: linear-gradient(180deg, rgba(255,255,255,0.25) 0%, transparent 60%);
}

.confidence-value {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 28px;
  color: #c4f135;
  margin-top: 8px;
}

/* Spacer */
.flex-grow { flex: 1; }

/* Glass panel for secondary tribe */
.glass-panel {
  background: rgba(245,245,245,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(245,245,245,0.08);
  border-radius: 16px;
  padding: 28px 36px;
  margin-top: auto;
}

.secondary-label {
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  color: #a0a0a0;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
}

.secondary-tribe {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  color: #ff5c35;
  letter-spacing: 2px;
}

/* Rarity line */
.rarity-line {
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(196,241,53,0.7);
  margin-bottom: 24px;
}
</style>
</head>
<body>
  <div class="card-border"></div>

  <div class="grain">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#grain)"/>
    </svg>
  </div>

  <div class="tribe-glow"></div>
  <div class="tribe-glow-2"></div>

  <div class="rarity-badge {{ rarity_class }}">{{ rarity_label }}</div>

  <div class="content">
    <div class="tribe-header">Your Taste Tribe</div>
    <div class="tribe-icon">{{ tribe_icon }}</div>

    <div class="tribe-name">
      {% for word in tribe_words %}
      <span class="word">{{ word }}</span>
      {% endfor %}
    </div>

    <div class="tagline">"{{ tagline }}"</div>

    <div class="confidence-section">
      <div class="confidence-label">Tribe Confidence</div>
      <div class="confidence-track">
        <div class="confidence-fill" style="width: {{ confidence }}%;"></div>
      </div>
      <div class="confidence-value">{{ confidence }}%</div>
    </div>

    <div class="rarity-line">{{ rarity_pct }}% of Frequenz users share this tribe</div>

    <div class="flex-grow"></div>

    <div class="glass-panel">
      <div class="secondary-label">Secondary Tribe</div>
      <div class="secondary-tribe">{{ secondary_tribe }}</div>
    </div>
  </div>

  <div class="branding">frequenz.live</div>
  <div class="card-number">3/5</div>
</body>
</html>
