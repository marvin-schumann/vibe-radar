<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  @font-face { font-family: 'Bebas Neue'; font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/bebas-neue-regular.woff2') format('woff2'); }
  @font-face { font-family: 'DM Sans'; font-style: normal; font-weight: 300 600; font-display: swap; src: url('/static/fonts/dm-sans-regular.woff2') format('woff2'); }
  @font-face { font-family: 'DM Sans'; font-style: italic; font-weight: 400; font-display: swap; src: url('/static/fonts/dm-sans-italic.woff2') format('woff2'); }
  @font-face { font-family: 'Space Mono'; font-style: normal; font-weight: 400; font-display: swap; src: url('/static/fonts/space-mono-regular.woff2') format('woff2'); }
  @font-face { font-family: 'Space Mono'; font-style: normal; font-weight: 700; font-display: swap; src: url('/static/fonts/space-mono-bold.woff2') format('woff2'); }
</style>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  background: #0c0c0c;
  overflow: hidden;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

.card-border {
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  border-image: linear-gradient(135deg, #c4f135, #ff5c35) 1;
  pointer-events: none;
  z-index: 100;
}

.grain {
  position: absolute;
  inset: 0;
  z-index: 90;
  opacity: 0.35;
  pointer-events: none;
}
.grain svg { width: 100%; height: 100%; }

/* Subtle lime diagonal wash */
.diagonal-wash {
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, transparent 30%, rgba(196,241,53,0.04) 60%, rgba(196,241,53,0.08) 100%);
  z-index: 1;
}

/* Lime glow behind city name */
.city-glow {
  position: absolute;
  width: 1000px;
  height: 500px;
  top: 30%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(ellipse, rgba(196,241,53,0.12) 0%, rgba(196,241,53,0.04) 45%, transparent 70%);
  z-index: 1;
}

/* Lime glow rising from behind skyline */
.skyline-glow {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 1200px;
  height: 500px;
  background: radial-gradient(ellipse at 50% 100%, rgba(196,241,53,0.10) 0%, rgba(196,241,53,0.04) 40%, transparent 70%);
  z-index: 2;
  pointer-events: none;
}

/* Skyline container */
.skyline-container {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 1080px;
  height: 420px;
  z-index: 3;
  pointer-events: none;
}

.content {
  position: relative;
  z-index: 10;
  padding: 260px 72px 280px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Rarity badge */
.rarity-badge {
  position: absolute;
  top: 42px;
  right: 42px;
  z-index: 50;
  padding: 8px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 4px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.rarity-common { background: rgba(160,160,160,0.15); color: #a0a0a0; border: 1px solid rgba(160,160,160,0.3); }
.rarity-uncommon { background: rgba(196,241,53,0.1); color: #c4f135; border: 1px solid rgba(196,241,53,0.3); }
.rarity-rare { background: rgba(255,92,53,0.12); color: #ff5c35; border: 1px solid rgba(255,92,53,0.35); }
.rarity-legendary { background: linear-gradient(135deg, rgba(196,241,53,0.15), rgba(255,92,53,0.15)); color: #f5f5f5; border: 1px solid rgba(255,200,50,0.5); box-shadow: 0 0 20px rgba(255,200,50,0.15); }

.card-number {
  position: absolute;
  bottom: 42px;
  right: 48px;
  z-index: 50;
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(160,160,160,0.5);
  letter-spacing: 1px;
}

.branding {
  position: absolute;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(160,160,160,0.45);
  letter-spacing: 1px;
}

/* Sonic home label */
.sonic-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  color: #a0a0a0;
  text-align: center;
  letter-spacing: 4px;
  text-transform: uppercase;
  margin-bottom: 12px;
}

/* Huge city name — lime */
.city-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 140px;
  color: #c4f135;
  text-align: center;
  line-height: 0.9;
  letter-spacing: 10px;
  text-shadow: 0 0 60px rgba(196,241,53,0.35), 0 0 120px rgba(196,241,53,0.15);
  margin-bottom: 48px;
}

/* City breakdown */
.breakdown {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 16px;
  max-width: 750px;
  margin: 0 auto;
  width: 100%;
}

.city-row {
  display: grid;
  grid-template-columns: 100px 1fr;
  gap: 20px;
  align-items: center;
}

.city-pct {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 32px;
  text-align: right;
}

.city-detail {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.city-detail-name {
  font-family: 'DM Sans', sans-serif;
  font-size: 24px;
}

.city-bar-track {
  width: 100%;
  height: 8px;
  background: rgba(245,245,245,0.06);
  border-radius: 4px;
  overflow: hidden;
}

.city-bar-fill {
  height: 100%;
  border-radius: 4px;
}

/* Primary city — lime accent */
.primary .city-pct { color: #c4f135; }
.primary .city-detail-name { color: #f5f5f5; font-weight: 700; }
.primary .city-bar-fill {
  background: linear-gradient(90deg, #c4f135, #e8f77a);
  box-shadow: 0 0 12px rgba(196,241,53,0.4);
}

/* Secondary cities */
.secondary .city-pct { color: rgba(245,245,245,0.5); }
.secondary .city-detail-name { color: #a0a0a0; }
.secondary .city-bar-fill { background: rgba(245,245,245,0.12); }

/* Glass panel */
.glass-panel {
  background: rgba(245,245,245,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(245,245,245,0.08);
  border-radius: 16px;
  padding: 22px 36px;
  text-align: center;
  margin-top: auto;
}

.hashtag {
  font-family: 'Space Mono', monospace;
  font-size: 24px;
  color: #c4f135;
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <div class="card-border"></div>

  <div class="grain">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="grain"><feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/><feColorMatrix type="saturate" values="0"/></filter>
      <rect width="100%" height="100%" filter="url(#grain)"/>
    </svg>
  </div>

  <div class="diagonal-wash"></div>
  <div class="city-glow"></div>
  <div class="skyline-glow"></div>

  <!-- City skyline SVG silhouette with reflection -->
  <div class="skyline-container">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" width="1080" height="420">
      <defs>
        <linearGradient id="reflectFade" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="white" stop-opacity="1"/>
          <stop offset="100%" stop-color="white" stop-opacity="0"/>
        </linearGradient>
        <mask id="reflectMask">
          <rect x="0" y="385" width="1080" height="35" fill="url(#reflectFade)"/>
        </mask>
      </defs>
      <!-- Skyline silhouette -->
      <path d="{{ skyline_d }}" fill="#1a1a1a"/>
      <!-- Compressed reflection -->
      <path d="{{ skyline_d }}" fill="#1a1a1a" transform="translate(0,385) scale(1,-0.08) translate(0,-385)" mask="url(#reflectMask)" opacity="0.08"/>
    </svg>
  </div>

  <div class="rarity-badge {{ rarity_class }}">{{ rarity_label }}</div>

  <div class="content">
    <div class="sonic-label">Your Sonic Home</div>
    <div class="city-name">{{ top_city }}</div>

    <div class="breakdown">
      {% for c in cities %}
      <div class="city-row {{ 'primary' if loop.index == 1 else 'secondary' }}">
        <div class="city-pct">{{ c.pct }}%</div>
        <div class="city-detail">
          <div class="city-detail-name">{{ c.name }}</div>
          <div class="city-bar-track">
            <div class="city-bar-fill" style="width: {{ c.bar_width }}%;"></div>
          </div>
        </div>
      </div>
      {% endfor %}
    </div>

    <div class="glass-panel">
      <div class="hashtag">{{ hashtag }}</div>
    </div>
  </div>

  <div class="branding">frequenz.live</div>
  <div class="card-number">2/5</div>
</body>
</html>
