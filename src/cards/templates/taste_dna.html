<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,700;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px;
  height: 1920px;
  background: #0c0c0c;
  overflow: hidden;
  position: relative;
  font-family: 'DM Sans', sans-serif;
}

/* Gradient border */
.card-border {
  position: absolute;
  inset: 0;
  border: 1px solid transparent;
  border-image: linear-gradient(135deg, #c4f135, #ff5c35) 1;
  pointer-events: none;
  z-index: 100;
}

/* Grain overlay */
.grain {
  position: absolute;
  inset: 0;
  z-index: 90;
  opacity: 0.35;
  pointer-events: none;
}
.grain svg { width: 100%; height: 100%; }

/* Background glows */
.glow-1 {
  position: absolute;
  width: 900px;
  height: 900px;
  top: 25%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: radial-gradient(circle, rgba(196,241,53,0.18) 0%, rgba(196,241,53,0.05) 40%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
}
.glow-2 {
  position: absolute;
  width: 600px;
  height: 600px;
  bottom: 15%;
  right: -10%;
  background: radial-gradient(circle, rgba(255,92,53,0.12) 0%, transparent 70%);
  border-radius: 50%;
  z-index: 1;
}

/* Content area — safe zone */
.content {
  position: relative;
  z-index: 10;
  padding: 280px 72px 280px;
  height: 100%;
  display: flex;
  flex-direction: column;
}

/* Rarity badge */
.rarity-badge {
  position: absolute;
  top: 42px;
  right: 42px;
  z-index: 50;
  padding: 8px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  border-radius: 4px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.rarity-common {
  background: rgba(160,160,160,0.15);
  color: #a0a0a0;
  border: 1px solid rgba(160,160,160,0.3);
}
.rarity-uncommon {
  background: rgba(196,241,53,0.1);
  color: #c4f135;
  border: 1px solid rgba(196,241,53,0.3);
}
.rarity-rare {
  background: rgba(255,92,53,0.12);
  color: #ff5c35;
  border: 1px solid rgba(255,92,53,0.35);
}
.rarity-legendary {
  background: linear-gradient(135deg, rgba(196,241,53,0.15), rgba(255,92,53,0.15));
  color: #f5f5f5;
  border: 1px solid rgba(255,200,50,0.5);
  box-shadow: 0 0 20px rgba(255,200,50,0.15);
}

/* Card number */
.card-number {
  position: absolute;
  bottom: 42px;
  right: 48px;
  z-index: 50;
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(160,160,160,0.5);
  letter-spacing: 1px;
}

/* Branding */
.branding {
  position: absolute;
  bottom: 42px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 50;
  font-family: 'Space Mono', monospace;
  font-size: 20px;
  color: rgba(160,160,160,0.45);
  letter-spacing: 1px;
}

/* === Card-specific styles === */

.label {
  font-family: 'DM Sans', sans-serif;
  font-size: 28px;
  color: #a0a0a0;
  margin-bottom: 8px;
  letter-spacing: 1px;
}

.title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 96px;
  color: #f5f5f5;
  line-height: 1;
  letter-spacing: 3px;
  margin-bottom: 12px;
}

.subtitle {
  font-family: 'Space Mono', monospace;
  font-size: 24px;
  color: #a0a0a0;
  margin-bottom: 56px;
}

.hero-number {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 120px;
  line-height: 1;
  background: linear-gradient(135deg, #c4f135, #ff5c35);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}

.hero-label {
  font-family: 'DM Sans', sans-serif;
  font-size: 22px;
  color: #a0a0a0;
  margin-bottom: 48px;
}

/* Genre bars */
.genre-bars {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 28px;
}

.genre-row {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.genre-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}

.genre-name {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 44px;
  color: #f5f5f5;
  letter-spacing: 2px;
}

.genre-pct {
  font-family: 'Space Mono', monospace;
  font-weight: 700;
  font-size: 36px;
  color: #f5f5f5;
}

.genre-bar-track {
  width: 100%;
  height: 32px;
  background: rgba(245,245,245,0.06);
  border-radius: 16px;
  overflow: hidden;
  position: relative;
}

.genre-bar-fill {
  height: 100%;
  border-radius: 16px;
  position: relative;
  box-shadow: 0 0 20px var(--bar-glow);
}

.genre-bar-fill::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,0.2) 0%, transparent 60%);
}

/* Bottom section */
.bottom-section {
  margin-top: auto;
}

.tagline {
  font-family: 'DM Sans', sans-serif;
  font-style: italic;
  font-size: 26px;
  color: #a0a0a0;
  margin-bottom: 12px;
}

.depth-line {
  font-family: 'Space Mono', monospace;
  font-size: 22px;
  color: #c4f135;
}

/* Glass panel */
.glass-panel {
  background: rgba(245,245,245,0.04);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(245,245,245,0.08);
  border-radius: 16px;
  padding: 32px 36px;
}
</style>
</head>
<body>
  <div class="card-border"></div>

  <!-- Grain -->
  <div class="grain">
    <svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%">
      <filter id="grain">
        <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="4" stitchTiles="stitch"/>
        <feColorMatrix type="saturate" values="0"/>
      </filter>
      <rect width="100%" height="100%" filter="url(#grain)"/>
    </svg>
  </div>

  <!-- Glows -->
  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <!-- Rarity badge -->
  <div class="rarity-badge {{ rarity_class }}">{{ rarity_label }}</div>

  <!-- Content -->
  <div class="content">
    <div class="label">YOUR MUSIC FINGERPRINT</div>
    <div class="title">TASTE DNA</div>
    <div style="display: flex; align-items: baseline; gap: 24px; margin-bottom: 8px;">
      <div class="hero-number">{{ total_artists }}</div>
    </div>
    <div class="hero-label">artists analysed</div>

    <div class="genre-bars">
      {% for g in genres %}
      <div class="genre-row">
        <div class="genre-header">
          <span class="genre-name">{{ g.name }}</span>
          <span class="genre-pct">{{ g.pct }}%</span>
        </div>
        <div class="genre-bar-track">
          <div class="genre-bar-fill" style="width: {{ g.bar_width }}%; background: linear-gradient(90deg, {{ g.color_start }}, {{ g.color_end }}); --bar-glow: {{ g.color_start }};"></div>
        </div>
      </div>
      {% endfor %}
    </div>

    <div class="bottom-section">
      <div class="glass-panel" style="display: flex; justify-content: space-between; align-items: center;">
        <div>
          <div class="tagline">Your music fingerprint, decoded.</div>
          <div class="depth-line">Underground depth: {{ underground_depth }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Branding & number -->
  <div class="branding">frequenz.live</div>
  <div class="card-number">1/5</div>
</body>
</html>
